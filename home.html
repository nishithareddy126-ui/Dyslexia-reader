<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
  <div class="container-fluid justify-content-center">
    <a class="navbar-brand fw-bold" href="#">AI Reader</a>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Profile</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
        <li class="nav-item"><a class="nav-link">Logout</a></li>
      </ul>
    </div>
    <div class="ms-4">
      <label class="switch">
        <input type="checkbox" id="fontToggle" onchange="toggleFont()">
        <span class="slider"></span>
      </label>
      <span class="ms-2">Font</span>
    </div>
  </div>
</nav>


<div class="container mt-5">
  <div class="form-floating">
    <textarea class="form-control" id="textInput" placeholder="Enter text here" style="height:300px;"></textarea>
    <label for="textInput">Please Enter The Text:</label>
  </div>
  <div class="text-center mt-3">
  <button class="btn btn-sm btn-primary px-4" onclick="redirectToOutput()">Convert</button>
</div>

</div>

<script>
function redirectToOutput() {
  const text = document.getElementById("textInput").value;
  if (!text) {
    alert("Please enter text!");
    return;
  }
  localStorage.setItem("inputText", text);
  window.location.href = "output.html";
}
function toggleFont() {
  document.body.classList.toggle("dyslexia-font");
}
</script>
</body>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AI Reader</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet">
  <link rel="stylesheet" href="homeStyle.css">
</head>

<body class="p-4">
  <div class="mb-3 d-flex justify-content-between align-items-center">
    <div>
      <button class="btn btn-dark me-2" onclick="startReading()">Start</button>
      <button class="btn btn-dark me-2" onclick="pauseReading()">Pause</button>
      <button class="btn btn-dark me-2" onclick="resumeReading()">Resume</button>
    </div>
    <div>
      <button class="btn btn-secondary me-2" onclick="startSpeech()">🔊 Read</button>
      <button class="btn btn-danger" onclick="stopSpeech()">⏹ Stop</button>
      <select id="voiceSelect" class="form-select d-inline-block ms-2" style="width:auto;"></select>
    </div>
  </div>

  <div class="mb-3">
    <label class="fw-bold">Speed:</label>
    <input type="range" id="speedRange" min="100" max="600" step="50" value="300">
    <span id="speedValue">300 ms</span>
  </div>

  <div class="mb-3 d-flex align-items-center gap-3">
    <button class="btn btn-primary" onclick="simplifyLocalBtn()">Simplify (Local)</button>
    <button class="btn btn-primary" onclick="simplifyTextAPI()">Simplify (AI)</button>
    <select id="level" class="form-select w-auto">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
    <!-- Mode Toggle: AI Mode ↔ Manual Mode -->
    <button id="modeToggleBtn" class="btn btn-primary">&#x1F504; Switch to Manual Mode</button>
  </div>

  <h4 class="fw-bold">Output:</h4>
  <p id="modeLabel" class="fw-bold text-primary"></p>
  <p id="adaptInfo" class="text-muted"></p>
  <p id="uiAdapt" class="text-muted fst-italic"></p>
  <div id="output" class="p-3 shadow-sm" style="background: #fff; border-radius: 12px;"></div>
  <p id="readingStats" class="text-success fw-bold"></p>

  <div class="mt-4">
    <button class="btn btn-outline-secondary" onclick="goHome()">⬅ Back to Home</button>
  </div>

  <!-- ⚙️ Settings Button -->
  <button id="settings-btn" title="User Settings" aria-label="Open settings panel">⚙️</button>

  <!-- Settings Panel -->
  <div id="settings-panel" role="dialog" aria-label="User display settings">

    <div class="sp-header">
      <span class="sp-title">⚙️ Display Settings</span>
      <button class="sp-close" id="settings-close" aria-label="Close settings">✕</button>
    </div>

    <!-- Font Size -->
    <div class="sp-row">
      <label class="sp-label" for="sp-font-size">
        Font Size
        <span class="sp-val" id="sp-font-size-val">22px</span>
      </label>
      <input type="range" id="sp-font-size" min="16" max="40" step="1" value="22" aria-label="Font size slider">
    </div>

    <!-- Line Spacing -->
    <div class="sp-row">
      <label class="sp-label" for="sp-line-spacing">
        Line Spacing
        <span class="sp-val" id="sp-line-spacing-val">1.8</span>
      </label>
      <input type="range" id="sp-line-spacing" min="1.2" max="3" step="0.1" value="1.8"
        aria-label="Line spacing slider">
    </div>

    <!-- Background Color -->
    <div class="sp-row">
      <label class="sp-label">Background Color</label>
      <div class="sp-color-row">
        <input type="color" id="sp-bg-color" value="#ffffff" aria-label="Background color picker">
        <div class="sp-color-presets">
          <div class="sp-preset" style="background:#ffffff;" data-color="#ffffff" title="White"></div>
          <div class="sp-preset" style="background:#fdf6e3;" data-color="#fdf6e3" title="Cream"></div>
          <div class="sp-preset" style="background:#e8f5e9;" data-color="#e8f5e9" title="Mint"></div>
          <div class="sp-preset" style="background:#e3f2fd;" data-color="#e3f2fd" title="Sky"></div>
          <div class="sp-preset" style="background:#f3e5f5;" data-color="#f3e5f5" title="Lavender"></div>
          <div class="sp-preset" style="background:#1e1e2e;" data-color="#1e1e2e" title="Dark"></div>
        </div>
      </div>
    </div>

    <!-- Reset -->
    <button class="sp-reset" id="sp-reset-btn">↺ Reset to Defaults</button>
  </div>

  <script src="script.js"></script>
  <script>
    window.onload = function () {
      const text = localStorage.getItem("inputText") || "";
      if (text) {
        words = text.split(/\s+/);
        index = 0;
        displayText();
      }
      // Apply saved user preferences after content loads (only if in manual mode)
      if (isManualMode && typeof applyUserPreferences === "function") applyUserPreferences();
    };
    function goHome() {
      window.location.href = "home.html";
    }
  </script>
</body>

</html>

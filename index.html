<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Login Page</title>
</head>

<body>


    <div class="container-fluid d-flex justify-content-center align-items-center">

        <form id="loginForm">

            <label for="loginEmail" class="form-label">Email:</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="Enter email" required>

            <label for="loginPassword" class="form-label mt-2">Password:</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>

            <button type="submit" class="btn btn-primary mt-3"><a href="home.html" id="loginlink"
                    style="text-decoration: none; color:white;">Login</a></button>

            <p class="mt-3 text-center">
                Don't have an account?
                <a href="registration.html">Register</a>
            </p>

        </form>

    </div>

</body>

</html>
